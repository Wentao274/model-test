[pytest]
# pytest配置文件

# 测试发现路径
testpaths = tests

# Python文件匹配模式
python_files = test_*.py

# 测试类匹配模式
python_classes = Test*

# 测试函数匹配模式
python_functions = test_*

# 标记定义
markers =
    a_basic: A类测试 - 基础推理能力
    b_advanced: B类测试 - 高级生成功能
    c_multimodal: C类测试 - 多模态能力
    d_long_context: D类测试 - 长上下文处理
    e_performance: E类测试 - 性能指标
    f_stability: F类测试 - 稳定性与边界
    g_api: G类测试 - API兼容性
    h_quality: H类测试 - 质量评估
    i_long_context: I类测试 - 单项超长上下文验证
    p0: P0优先级测试
    p1: P1优先级测试
    p2: P2优先级测试
    slow: 慢速测试
    smoke: 冒烟测试 - 核心功能快速验证
    integration: 集成测试

# 输出配置
addopts =
    -v
    -s
    --tb=long
    --strict-markers
    --disable-warnings

# 日志配置
log_cli = false
log_cli_level = DEBUG
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 最小Python版本
minversion = 7.0